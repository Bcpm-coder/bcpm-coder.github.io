<section
  class="welcome-screen"
  [class.is-leaving]="leaving()"
  [attr.aria-busy]="leaving()"
  role="dialog"
  aria-modal="true"
  aria-labelledby="welcome-title"
  (animationend)="onExitAnimationEnd($event)">
  <div
    class="wallpaper-image"
    [style.background-image]="'url(\'' + wallpaperUrl() + '\')'"
    aria-hidden="true">
  </div>
  <div class="wallpaper-glow glow-one" aria-hidden="true"></div>
  <div class="wallpaper-glow glow-two" aria-hidden="true"></div>
  <div class="wallpaper-glow glow-three" aria-hidden="true"></div>
  <div class="wallpaper-grain" aria-hidden="true"></div>

  <header class="mac-status-bar">
    <span class="brand-mark">bcpm Blog</span>
    <div class="mac-status" aria-hidden="true">
      <span class="status-language">中</span>
      <svg class="wifi-icon" viewBox="0 0 24 18">
        <path d="M2 5.5C7.8.5 16.2.5 22 5.5M5.5 9c3.7-3.1 9.3-3.1 13 0M9 12.5c1.7-1.4 4.3-1.4 6 0M12 16h.01" />
      </svg>
      <span class="battery-icon"><i></i></span>
    </div>
  </header>

  <main class="welcome-content">
    <div class="lock-clock" aria-label="当前时间">
      <strong>{{ time() }}</strong>
      <span>{{ date() }}</span>
    </div>

    <div class="login-card">
      <div class="avatar-shell">
        <img src="/assets/images/logos/avatar.jpg" alt="bcpm 的头像">
      </div>

      <h1 id="welcome-title">欢迎进入 bcpm 的 Blog</h1>
      <p class="description">代码、项目与生活片段，都在这里慢慢生长。</p>

      <button type="button" class="enter-button" autofocus [disabled]="leaving()" (click)="confirmEntry()">
        <span>进入桌面</span>
        <span class="enter-arrow" aria-hidden="true">
          <svg viewBox="0 0 24 24">
            <path d="M5 12h13M13 7l5 5-5 5" />
          </svg>
        </span>
      </button>
      <p class="hint">点击按钮进入个人桌面</p>
    </div>
  </main>

  <footer class="welcome-footer">
    <span class="footer-dot" aria-hidden="true"></span>
    <span>BCPM PERSONAL WORKSPACE</span>
  </footer>
</section>
