<section
  class="welcome-screen"
  [class.is-leaving]="leaving()"
  [attr.aria-busy]="leaving()"
  role="dialog"
  aria-modal="true"
  aria-labelledby="profile-name"
  (animationend)="onExitAnimationEnd($event)">
  <div class="ambient-light ambient-light-left" aria-hidden="true"></div>
  <div class="ambient-light ambient-light-bottom" aria-hidden="true"></div>

  <main class="welcome-content">
    <div class="lock-clock" aria-label="当前时间">
      <span>{{ date() }}</span>
      <strong>{{ time() }}</strong>
    </div>

    <div class="login-card">
      <div class="avatar-shell">
        <img src="/assets/images/logos/avatar.jpg" alt="bcpm 的头像">
      </div>

      <div class="welcome-copy">
        <h1 id="profile-name">欢迎进入 bcpm 的 Blog</h1>
        <p>代码、项目与生活片段，都在这里慢慢生长。</p>
      </div>

      <button
        type="button"
        class="enter-button"
        aria-label="进入桌面"
        [disabled]="leaving()"
        (click)="confirmEntry()">
        <svg viewBox="0 0 24 24" aria-hidden="true">
          <path d="M5 12h13M13 7l5 5-5 5" />
        </svg>
      </button>
    </div>
  </main>
</section>
