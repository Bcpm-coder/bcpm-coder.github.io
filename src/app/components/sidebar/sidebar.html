<div 
  class="mac-dock absolute select-none z-40 left-0 w-auto flex flex-col justify-between items-center">
  
  <div class="flex flex-col justify-start items-center">
    @for (app of favouriteApps(); track app.id) {
      <button
        type="button"
        class="dock-item w-11 h-11 md:w-14 md:h-14 rounded m-0.5 md:m-1 flex items-center justify-center cursor-pointer"
        (click)="openApp(app)"
        [attr.aria-label]="'打开' + app.title"
        [title]="app.title">
        <img [src]="app.icon" [alt]="app.title" [class.rounded-full]="app.id === 'about'" [class.object-cover]="app.id === 'about'" class="w-9 h-9 md:w-12 md:h-12">
      </button>
    }
    <button
      type="button"
      class="dock-item w-11 h-11 md:w-14 md:h-14 rounded m-0.5 md:m-1 flex items-center justify-center cursor-pointer"
      (click)="onShowAllApps()"
      aria-label="显示所有应用"
      title="显示所有应用">
      <img src="/assets/images/logos/app-launchpad.svg" alt="" class="w-9 h-9 md:w-12 md:h-12">
    </button>
  </div>
</div>
