<section class="wallpaper-settings">
  <header class="settings-header">
    <div>
      <p>外观</p>
      <h1>桌面与锁屏壁纸</h1>
    </div>
    <span>{{ wallpaperService.wallpapers.length }} 个资源</span>
  </header>

  <div class="current-preview">
    @if (wallpaperService.effectiveWallpaper().kind === 'video') {
      <img
        [src]="wallpaperService.staticFallbackWallpaper.assetUrl"
        [alt]="wallpaperService.selectedWallpaper().label + ' 动态壁纸预览'"
        decoding="async">
      <span class="current-video-badge">动态壁纸正在播放</span>
    } @else {
      <img
        [src]="wallpaperService.effectiveWallpaper().assetUrl"
        [alt]="wallpaperService.selectedWallpaper().label"
        decoding="async">
    }
    <div class="preview-caption">
      <span>当前壁纸</span>
      <strong>{{ wallpaperService.selectedWallpaper().label }}</strong>
    </div>
  </div>

  <div class="wallpaper-grid" aria-label="可选壁纸">
    @for (wallpaper of wallpaperService.wallpapers; track wallpaper.id) {
      <button
        type="button"
        class="wallpaper-card"
        [class.is-selected]="wallpaperService.selectedWallpaper().id === wallpaper.id"
        [class.is-disabled]="!wallpaperService.isSelectable(wallpaper)"
        [disabled]="!wallpaperService.isSelectable(wallpaper)"
        [attr.aria-pressed]="wallpaperService.selectedWallpaper().id === wallpaper.id"
        (click)="selectWallpaper(wallpaper)">
        <span class="wallpaper-media">
          @if (wallpaper.kind === 'video') {
            <img
              [src]="wallpaperService.staticFallbackWallpaper.assetUrl"
              [alt]="wallpaper.label + ' 动态壁纸预览'"
              loading="lazy"
              decoding="async">
            <span class="video-placeholder" aria-hidden="true">▶</span>
          } @else {
            <img [src]="wallpaper.assetUrl" [alt]="wallpaper.label" loading="lazy" decoding="async">
          }
          @if (wallpaper.kind === 'video') {
            <span class="type-badge">动态</span>
          }
          <span class="selected-check" aria-hidden="true">✓</span>
        </span>
        <span class="wallpaper-name">{{ wallpaper.label }}</span>
      </button>
    }
  </div>
</section>
