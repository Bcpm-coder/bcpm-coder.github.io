<div class="main-navbar-vp mac-menubar absolute top-0 right-0 w-screen flex flex-nowrap justify-between items-center text-xs md:text-sm select-none z-50">
  <div class="flex-1" aria-hidden="true"></div>
  
  <!-- Clock -->
  <div
    tabindex="0"
    class="menubar-control pl-1 md:pl-2 pr-1 md:pr-2 text-xs outline-none py-0.5 md:py-1">
    <app-clock></app-clock>
  </div>
  
  <!-- Status Bar -->
  <div class="flex-1 flex justify-end items-center pr-1">
    <div class="menubar-theme-switch" role="group" aria-label="系统主题">
      <button
        type="button"
        title="浅色主题"
        aria-label="浅色主题"
        [class.active]="themeService.theme() === 'light'"
        [attr.aria-pressed]="themeService.theme() === 'light'"
        (click)="setTheme('light')">
        <span aria-hidden="true">☀</span>
      </button>
      <button
        type="button"
        title="深色主题"
        aria-label="深色主题"
        [class.active]="themeService.theme() === 'dark'"
        [attr.aria-pressed]="themeService.theme() === 'dark'"
        (click)="setTheme('dark')">
        <span aria-hidden="true">☾</span>
      </button>
    </div>
    <div class="status-area relative">
      <button
        type="button"
        id="status-bar"
        aria-label="打开控制中心"
        [attr.aria-expanded]="statusCardVisible()"
        (click)="onStatusBarClick()"
        class="menubar-control status-trigger outline-none cursor-pointer">
        <app-status></app-status>
      </button>
      <app-status-card
        [visible]="statusCardVisible()"
        [lockScreen]="onLockScreen.bind(this)"
        (close)="onStatusCardClose()">
      </app-status-card>
    </div>
  </div>
</div>
