<div
  class="absolute rounded-md py-3 top-9 right-1 status-card"
  role="dialog"
  aria-label="控制中心"
  (click)="$event.stopPropagation()"
  [class.visible]="visible"
  [class.invisible]="!visible"
  [class.animateShow]="visible">
  
  <!-- Arrow pointing up -->
  <div class="absolute w-0 h-0 -top-1 right-6 top-arrow-up"></div>
  
  <!-- Sound Control -->
  <div class="status-row w-64 py-1.5 flex items-center justify-center">
    <div class="w-8">
      <span class="control-symbol" aria-hidden="true">♪</span>
    </div>
    <input
      type="range"
      aria-label="音乐音量"
      class="ubuntu-slider w-2/3"
      [value]="soundLevel()"
      (input)="onSoundChange($event)"
      min="0"
      max="100"
      step="1">
      <span class="sr-only">音量 {{ soundLevel() }}%</span>
  </div>
  
  <!-- Brightness Control -->
  <div class="status-row w-64 py-1.5 flex items-center justify-center">
    <div class="w-8">
      <span class="control-symbol" aria-hidden="true">☀</span>
    </div>
    <input
      type="range"
      aria-label="页面亮度"
      class="ubuntu-slider w-2/3"
      [value]="brightnessLevel()"
      (input)="onBrightnessChange($event)"
      min="0"
      max="100"
      step="1">
      <span class="sr-only">亮度 {{ brightnessLevel() }}%</span>
  </div>
  
  <!-- Divider -->
  <div class="w-64 flex content-center justify-center">
    <div class="w-2/4 border-black border-opacity-50 border-b my-2 border-solid"></div>
  </div>
  
  <!-- Lock Screen -->
  <button
    type="button"
    class="status-row status-action w-64 py-2 flex items-center justify-center cursor-pointer"
    (click)="lockScreen && lockScreen()">
    <div class="w-8">
      <span class="control-symbol" aria-hidden="true">⌁</span>
    </div>
    <div class="w-2/3 text-gray-400">
      <span>锁定屏幕</span>
    </div>
  </button>
</div>
