<div class="launchpad absolute inset-0 top-7 z-20" role="dialog" aria-label="启动台">
  <div class="launchpad-content" (click)="$event.stopPropagation()">
    <div class="launchpad-search flex items-center rounded-xl overflow-hidden">
      <img class="w-5 h-5" alt="搜索" src="/assets/images/logos/search.png" />
      <input 
        class="w-full p-1 bg-transparent focus:outline-none"
        placeholder="搜索应用"
        [value]="query()"
        (input)="onQueryChange($event)"
        (click)="$event.stopPropagation()" />
    </div>
    <div class="launchpad-grid">
      @for (app of filteredApps(); track app.id) {
        <app-desktop-icon [app]="app" (openApp)="handleOpenApp($event)"></app-desktop-icon>
      } @empty {
        <div class="launchpad-empty">
          <strong>没有找到应用</strong>
          <span>试试其他关键词</span>
        </div>
      }
    </div>
  </div>
</div>
