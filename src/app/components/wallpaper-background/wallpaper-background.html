<div
  class="wallpaper-fallback"
  [style.background-image]="'url(\'' + (wallpaperService.effectiveWallpaper().posterUrl || wallpaperService.staticFallbackWallpaper.assetUrl) + '\')'">
</div>

@if (wallpaperService.effectiveWallpaper().kind === 'image') {
  <div
    class="wallpaper-image"
    [style.background-image]="'url(\'' + wallpaperService.effectiveWallpaper().assetUrl + '\')'">
  </div>
} @else if (!videoFailed()) {
  <video
    class="wallpaper-video"
    [src]="wallpaperService.effectiveWallpaper().assetUrl"
    [poster]="wallpaperService.effectiveWallpaper().posterUrl || wallpaperService.staticFallbackWallpaper.assetUrl"
    [autoplay]="!wallpaperService.prefersReducedMotion()"
    [muted]="true"
    loop
    playsinline
    preload="auto"
    (loadeddata)="onVideoLoaded($event)"
    (canplay)="onVideoCanPlay($event)"
    (playing)="onVideoPlaying()"
    (error)="onVideoError()">
  </video>
}

<div class="wallpaper-vignette" aria-hidden="true"></div>
